apiVersion: apps/v1
kind: Deployment
metadata:
  name: ru-study
  namespace: ru-study
  labels:
    app.kubernetes.io/name: ru-study
    app.kubernetes.io/component: app
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: ru-study
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ru-study
        app.kubernetes.io/component: app
    spec:
      imagePullSecrets:
        - name: ghcr
      containers:
        - name: app
          image: ghcr.io/blanc-project/ru-study-app
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: ru-study-secret
                optional: false
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      restartPolicy: Always
