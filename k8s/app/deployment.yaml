apiVersion: apps/v1
kind: Deployment
metadata:
  name: ru-study
  namespace: ru-study
  labels:
    app.kubernetes.io/name: ru-study
    app.kubernetes.io/component: app
spec:
  replicas: 1
  revisionHistoryLimit: 5
  # SQLite (the cache backend) is single-writer — a RollingUpdate's brief
  # pod overlap risks two processes holding the file at once. Recreate
  # trades the old near-zero-downtime rollout for a short pod-down gap
  # during each deploy.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ru-study
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ru-study
        app.kubernetes.io/component: app
    spec:
      # A freshly provisioned PVC mounts root:root; fsGroup makes it
      # group-writable by the nonroot UID the distroless image runs as.
      securityContext:
        fsGroup: 65532
      imagePullSecrets:
        - name: ghcr
      containers:
        - name: app
          image: ghcr.io/blanc-project/ru-study-app
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: CACHE_DB_PATH
              value: /data/cache.sqlite
          envFrom:
            - secretRef:
                name: ru-study-secret
                optional: false
          volumeMounts:
            - name: cache-data
              mountPath: /data
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: cache-data
          persistentVolumeClaim:
            claimName: ru-study-cache
      restartPolicy: Always
